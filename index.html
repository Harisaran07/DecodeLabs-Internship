<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JourneyNest| Travel Booking</title>
    
    <!-- Typography: 2025 Aesthetics -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

<body class="page-fade">
    <!-- Navbar -->
    <header id="header" class="navbar-wrapper">
        <nav class="navbar container">
            <div class="logo">
                <i class="fa-solid fa-plane-departure"></i> JourneyNest
            </div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Tours</a></li>
                <li><a href="#">Explore</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme" title="Toggle dark / light mode">

            </button>
            <div class="mobile-menu-btn">
                <i class="fa-solid fa-bars"></i>
            </div>
        </nav>
    </header>

    <main>

        <section class="hero">
            <div class="hero-bg">
                <img src="images/hero.png" alt="Tropical Paradise Sunrise">
                <div class="hero-overlay"></div>
            </div>

            <div class="container hero-content">
                <div class="hero-panel">
                    <div class="hero-copy" data-animate="slide-up">

                        <p>Discover premium curated escapes, bold adventures, and unforgettable stays designed for explorers who crave more than a trip.</p>
